<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <pattern id="diamonds" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
      <!-- Large diamond -->
      <polygon points="30,2 58,30 30,58 2,30" fill="none" stroke="rgba(13,148,136,0.35)" stroke-width="1.5"/>
      <!-- Inner diamond facets -->
      <line x1="30" y1="2" x2="30" y2="58" stroke="rgba(13,148,136,0.2)" stroke-width="0.8"/>
      <line x1="2" y1="30" x2="58" y2="30" stroke="rgba(13,148,136,0.2)" stroke-width="0.8"/>
      <!-- Small accent diamond -->
      <polygon points="30,12 48,30 30,48 12,30" fill="none" stroke="rgba(20,184,166,0.2)" stroke-width="0.6"/>
      <!-- Corner sparkle dots -->
      <circle cx="30" cy="2" r="1.5" fill="rgba(13,148,136,0.4)"/>
      <circle cx="58" cy="30" r="1.5" fill="rgba(13,148,136,0.4)"/>
      <circle cx="30" cy="58" r="1.5" fill="rgba(13,148,136,0.4)"/>
      <circle cx="2" cy="30" r="1.5" fill="rgba(13,148,136,0.4)"/>
    </pattern>
  </defs>
  <rect width="200" height="200" fill="url(#diamonds)"/>
</svg>
